<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="t d"><title id="t">Converging lens ray diagram</title><desc id="d">An object beyond the focal point forms a real inverted image through a converging lens.</desc><rect width="960" height="540" fill="#f7f9fc"/><text x="480" y="48" text-anchor="middle" font-family="sans-serif" font-size="30" font-weight="700">Converging lens: object beyond focal point</text><line x1="60" y1="285" x2="900" y2="285" stroke="#596b7c" stroke-width="3"/><path d="M480 100 Q420 285 480 470 Q540 285 480 100" fill="#d9ecff" stroke="#315a7d" stroke-width="4"/><circle cx="330" cy="285" r="7" fill="#9a6b00"/><circle cx="630" cy="285" r="7" fill="#9a6b00"/><text x="330" y="320" text-anchor="middle" font-family="sans-serif" font-size="20">F</text><text x="630" y="320" text-anchor="middle" font-family="sans-serif" font-size="20">F</text><path d="M170 285 V135" stroke="#1e7d45" stroke-width="8" marker-end="url(#g)"/><text x="170" y="350" text-anchor="middle" font-family="sans-serif" font-size="20">object</text><path d="M170 135 H480 L760 365" fill="none" stroke="#276ca8" stroke-width="4"/><path d="M170 135 L760 365" fill="none" stroke="#9d3030" stroke-width="4" stroke-dasharray="12 8"/><path d="M760 285 V365" stroke="#8a3d91" stroke-width="8" marker-end="url(#p)"/><text x="760" y="410" text-anchor="middle" font-family="sans-serif" font-size="20">real, inverted image</text><defs><marker id="g" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0 6 L9 3 L0 0 z" fill="#1e7d45"/></marker><marker id="p" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0 0 L9 3 L0 6 z" fill="#8a3d91"/></marker></defs><text x="480" y="515" text-anchor="middle" font-family="sans-serif" font-size="19">Parallel ray refracts through far F; central ray continues straight.</text></svg>