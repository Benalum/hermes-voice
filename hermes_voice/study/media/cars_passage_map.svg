<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="t d"><title id="t">CARS passage map</title><desc id="d">A passage map tracks paragraph function, transitions, and the author's main idea.</desc><rect width="960" height="540" fill="#f7f9fc"/><text x="480" y="48" text-anchor="middle" font-family="sans-serif" font-size="30" font-weight="700">CARS passage map: record function, not every detail</text><g stroke="#315a7d" stroke-width="3"><rect x="75" y="125" width="200" height="95" rx="14" fill="#d9ecff"/><rect x="380" y="125" width="200" height="95" rx="14" fill="#fff0bd" stroke="#9a6b00"/><rect x="685" y="125" width="200" height="95" rx="14" fill="#ffd9e8" stroke="#9a3865"/></g><g font-family="sans-serif" text-anchor="middle"><text x="175" y="165" font-size="22" font-weight="700">Paragraph 1</text><text x="175" y="195" font-size="18">introduces problem</text><text x="480" y="165" font-size="22" font-weight="700">Paragraph 2</text><text x="480" y="195" font-size="18">example or evidence</text><text x="785" y="165" font-size="22" font-weight="700">Paragraph 3</text><text x="785" y="195" font-size="18">shift / counterargument</text></g><g stroke="#1e7d45" stroke-width="5" marker-end="url(#a)"><line x1="275" y1="172" x2="370" y2="172"/><line x1="580" y1="172" x2="675" y2="172"/></g><defs><marker id="a" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0 0 L0 6 L9 3 z" fill="#1e7d45"/></marker></defs><rect x="245" y="300" width="470" height="125" rx="18" fill="#e3f4e8" stroke="#1e7d45" stroke-width="4"/><text x="480" y="342" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="700">Main idea</text><text x="480" y="378" text-anchor="middle" font-family="sans-serif" font-size="20">subject + central claim + author's direction</text><text x="480" y="405" text-anchor="middle" font-family="sans-serif" font-size="17">broad enough for the whole passage; supported by the map</text><text x="480" y="485" text-anchor="middle" font-family="sans-serif" font-size="20">Track tone changes: however, yet, although, therefore, surprisingly</text></svg>