<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="t d"><title id="t">Classical and operant conditioning</title><desc id="d">Classical conditioning associates stimuli; operant conditioning associates behavior with consequences.</desc><rect width="960" height="540" fill="#f7f9fc"/><text x="480" y="48" text-anchor="middle" font-family="sans-serif" font-size="30" font-weight="700">Conditioning: what relationship is learned?</text><g font-family="sans-serif" text-anchor="middle"><text x="240" y="105" font-size="25" font-weight="700">Classical</text><text x="720" y="105" font-size="25" font-weight="700">Operant</text></g><g fill="#d9ecff" stroke="#315a7d" stroke-width="3"><rect x="55" y="175" width="150" height="75" rx="12"/><rect x="285" y="175" width="150" height="75" rx="12"/><rect x="525" y="175" width="150" height="75" rx="12"/><rect x="755" y="175" width="150" height="75" rx="12"/></g><g font-family="sans-serif" font-size="20" text-anchor="middle"><text x="130" y="220">Stimulus 1</text><text x="360" y="220">Stimulus 2</text><text x="600" y="220">Behavior</text><text x="830" y="210">Consequence</text><text x="830" y="235" font-size="16">reinforce or punish</text></g><g stroke="#1e7d45" stroke-width="5" marker-end="url(#a)"><line x1="205" y1="212" x2="275" y2="212"/><line x1="675" y1="212" x2="745" y2="212"/></g><defs><marker id="a" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0 0 L0 6 L9 3 z" fill="#1e7d45"/></marker></defs><g font-family="sans-serif" text-anchor="middle"><text x="240" y="330" font-size="22">Association between stimuli</text><text x="240" y="370" font-size="19">response is elicited</text><text x="720" y="330" font-size="22">Behavior → consequence</text><text x="720" y="370" font-size="19">future behavior changes</text><text x="480" y="455" font-size="21" font-weight="700">Reinforcement increases behavior. Punishment decreases behavior.</text><text x="480" y="492" font-size="18">Positive = add a stimulus. Negative = remove a stimulus.</text></g><line x1="480" y1="95" x2="480" y2="410" stroke="#b9c3cc" stroke-width="2" stroke-dasharray="9 8"/></svg>