<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="t d"><title id="t">Normal-phase chromatography</title><desc id="d">Less polar compound travels farther than a more polar compound on a polar stationary phase.</desc><rect width="960" height="540" fill="#f7f9fc"/><text x="480" y="48" text-anchor="middle" font-family="sans-serif" font-size="30" font-weight="700">Normal-phase TLC: polar stationary phase</text><rect x="250" y="90" width="460" height="390" rx="10" fill="#fff" stroke="#42566a" stroke-width="4"/><line x1="280" y1="410" x2="680" y2="410" stroke="#42566a" stroke-width="3"/><text x="720" y="417" font-family="sans-serif" font-size="18">origin</text><line x1="280" y1="135" x2="680" y2="135" stroke="#5f8fb8" stroke-width="3" stroke-dasharray="10 8"/><text x="720" y="142" font-family="sans-serif" font-size="18">solvent front</text><circle cx="390" cy="215" r="24" fill="#76b7e5"/><circle cx="570" cy="330" r="24" fill="#e58b76"/><text x="390" y="190" text-anchor="middle" font-family="sans-serif" font-size="19">less polar</text><text x="570" y="305" text-anchor="middle" font-family="sans-serif" font-size="19">more polar</text><path d="M390 395 V245" stroke="#1e7d45" stroke-width="5" marker-end="url(#a)"/><path d="M570 395 V360" stroke="#9d3030" stroke-width="5" marker-end="url(#a)"/><defs><marker id="a" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0 0 L0 6 L9 3 z" fill="context-stroke"/></marker></defs><text x="480" y="515" text-anchor="middle" font-family="sans-serif" font-size="21">Stronger attraction to silica → smaller travel distance and smaller Rf</text></svg>