<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="t d"><title id="t">General amino acid zwitterion</title><desc id="d">The alpha carbon bonded to an amino group, carboxyl group, hydrogen, and variable R group.</desc><rect width="960" height="540" fill="#f7f9fc"/><text x="480" y="52" text-anchor="middle" font-family="sans-serif" font-size="30" font-weight="700">General amino acid near physiological pH</text><g stroke="#26384a" stroke-width="5"><line x1="430" y1="270" x2="255" y2="270"/><line x1="530" y1="270" x2="705" y2="270"/><line x1="480" y1="225" x2="480" y2="130"/><line x1="480" y1="315" x2="480" y2="415"/></g><circle cx="480" cy="270" r="52" fill="#d9ecff" stroke="#315a7d" stroke-width="4"/><text x="480" y="281" text-anchor="middle" font-family="sans-serif" font-size="34" font-weight="700">Cα</text><text x="190" y="281" text-anchor="middle" font-family="sans-serif" font-size="38" font-weight="700">H₃N⁺</text><text x="770" y="281" text-anchor="middle" font-family="sans-serif" font-size="38" font-weight="700">COO⁻</text><text x="480" y="112" text-anchor="middle" font-family="sans-serif" font-size="34">H</text><rect x="390" y="420" width="180" height="72" rx="18" fill="#fff0bd" stroke="#9a6b00" stroke-width="3"/><text x="480" y="466" text-anchor="middle" font-family="sans-serif" font-size="30" font-weight="700">R group</text><g font-family="sans-serif" font-size="19" fill="#4d5e6f" text-anchor="middle"><text x="190" y="330">amino group</text><text x="770" y="330">carboxyl group</text><text x="480" y="520">side chain controls polarity, charge, and reactivity</text></g></svg>