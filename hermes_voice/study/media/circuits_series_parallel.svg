<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="t d"><title id="t">Series and parallel circuits</title><desc id="d">Comparison of resistor connections, current, voltage, and equivalent resistance.</desc><rect width="960" height="540" fill="#f7f9fc"/><text x="480" y="48" text-anchor="middle" font-family="sans-serif" font-size="30" font-weight="700">Resistors: series versus parallel</text><g fill="none" stroke="#26384a" stroke-width="5"><path d="M80 170 H400 V390 H80 V170"/><rect x="170" y="145" width="80" height="50"/><rect x="285" y="145" width="80" height="50"/><path d="M560 170 H880 V390 H560 V170"/><path d="M620 230 H700"/><rect x="700" y="205" width="100" height="50"/><path d="M800 230 H840 M620 330 H700"/><rect x="700" y="305" width="100" height="50"/><path d="M800 330 H840 M620 230 V330 M840 230 V330"/></g><g stroke="#9d3030" stroke-width="6"><line x1="65" y1="250" x2="95" y2="250"/><line x1="72" y1="275" x2="88" y2="275"/><line x1="545" y1="250" x2="575" y2="250"/><line x1="552" y1="275" x2="568" y2="275"/></g><g font-family="sans-serif" text-anchor="middle"><text x="240" y="115" font-size="25" font-weight="700">Series</text><text x="720" y="115" font-size="25" font-weight="700">Parallel</text><text x="240" y="440" font-size="20">same current</text><text x="240" y="474" font-size="20">Rₑq = R₁ + R₂</text><text x="720" y="440" font-size="20">same voltage</text><text x="720" y="474" font-size="20">1/Rₑq = 1/R₁ + 1/R₂</text><text x="480" y="520" font-size="19">Adding a parallel branch lowers total resistance.</text></g></svg>