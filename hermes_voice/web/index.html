<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hermes Voice</title>
  <style>
    :root { color-scheme: dark; }
  html, body { min-height: 100%; }
  body {
    margin: 0; min-height: 100%; display: flex; flex-direction: column;
    align-items: center; overflow-x: hidden; overflow-y: auto;
    background: #101014; color: #e8e8ec;
    font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  #app-header {
    box-sizing: border-box;
    width: 100%; display: flex; flex-direction: column; align-items: center;
    gap: 0.75rem; padding: 1rem;
    background: #101014; border-bottom: 1px solid #26262e;
  }

  #voice-actions {
    position: sticky; top: 0; z-index: 10; box-sizing: border-box;
    width: 100%; display: flex; justify-content: center;
    align-items: center; flex-wrap: wrap;
    gap: 0.5rem; padding: 0.65rem 1rem;
    background: rgba(16, 16, 20, 0.96);
    border-bottom: 1px solid #26262e;
    backdrop-filter: blur(12px);
  }
    h1 { font-size: 1.1rem; font-weight: 600; letter-spacing: 0.04em; margin: 0; }
    #controls, #topic-controls {
      width: min(760px, 100%); display: flex; gap: 0.5rem; align-items: center;
      flex-wrap: wrap; justify-content: center;
    }
    #chat-controls {
      width: min(420px, 100%); display: grid; gap: 0.5rem;
    }
    button, input, select {
      background: #1c1c24; color: inherit; border: 1px solid #33333e;
      border-radius: 8px; padding: 0.5rem 1rem; font-size: 0.95rem;
    }
    button, select { cursor: pointer; }
    button:disabled, input:disabled, select:disabled { opacity: 0.4; cursor: default; }
    #topic-search { min-width: min(250px, 100%); }
    #chat-search, #chat { box-sizing: border-box; width: 100%; max-width: 100%; }
    #topic { min-width: min(280px, 100%); max-width: 100%; }
    #topic-status { color: #a9a9b5; font-size: 0.85rem; }
    #immersion-control {
      display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.45rem 0.7rem;
      border: 1px solid #33333e; border-radius: 8px; background: #1c1c24;
      cursor: pointer; user-select: none; white-space: nowrap;
    }
    #immersion-control input { margin: 0; accent-color: #8ab4ff; }
    #state {
      padding: 0.25rem 0.9rem; border-radius: 999px; font-size: 0.85rem;
      background: #26262e; text-transform: capitalize;
    }
    #state[data-state="listening"] { background: #123524; color: #7ee2a8; }
    #state[data-state="transcribing"] { background: #3a2418; color: #ffb77a; }
    #state[data-state="speaking"] { background: #1c2a4a; color: #8ab4ff; }
    #state[data-state="waiting"] { background: #3a2e14; color: #ffd479; }
    #mute-indicator {
      display: inline-flex; align-items: center; gap: 0.45rem;
      font-weight: 700; letter-spacing: 0.02em; text-transform: uppercase;
      font-size: 0.8rem; padding: 0.3rem 0.85rem;
      border-radius: 999px; border: 1px solid transparent;
    }
    #mute-indicator::before {
      content: ""; width: 0.6rem; height: 0.6rem; border-radius: 50%;
      background: currentColor; box-shadow: 0 0 0 0 currentColor;
    }
    #mute-indicator[data-muted="false"] {
      background: #123524; color: #7ee2a8; border-color: #1f6b43;
    }
    #mute-indicator[data-muted="true"] {
      background: #4a1f12; color: #ff9d5c; border-color: #b5531f;
      animation: mute-pulse 1.1s ease-in-out infinite;
    }
    @keyframes mute-pulse {
      0%   { box-shadow: 0 0 0 0 rgba(255, 157, 92, 0.55); }
      70%  { box-shadow: 0 0 0 0.5rem rgba(255, 157, 92, 0); }
      100% { box-shadow: 0 0 0 0 rgba(255, 157, 92, 0); }
    }
    #top-button { font-weight: 600; }
  #transcript {
    box-sizing: border-box; width: min(680px, calc(100% - 2rem));
    flex: 1 0 auto; min-height: 50vh; overflow: visible; display: flex;
    flex-direction: column; gap: 0.5rem; padding: 1rem 0 2rem;
  }
    .line { padding: 0.5rem 0.9rem; border-radius: 12px; max-width: 85%; white-space: pre-wrap; }
    .line.user { align-self: flex-end; background: #2b3a55; }
    .line.agent { align-self: flex-start; background: #22222a; }
  </style>
</head>
<body>
  <header id="app-header">
    <h1>HERMES VOICE</h1>

    <div id="controls">
      <div id="chat-controls">
        <input
          id="chat-search"
          type="search"
          aria-label="Filter Telegram chats"
          placeholder="Filter your chats"
          disabled
        >
        <select id="chat" aria-label="Telegram chat" disabled></select>
      </div>
      <span id="chat-status" role="status">not connected</span>
      <button id="start">Start</button>
      <label
        id="immersion-control"
        title="Show the latest consecutive user and Hermes message groups"
      >
        <input id="immersion" type="checkbox">
        Immersion
      </label>
    </div>
  </header>

  <div id="voice-actions" aria-label="Active voice controls and status">
    <span
      id="state"
      data-state="idle"
      role="status"
      aria-live="polite"
      aria-atomic="true"
    >Idle</span>
    <button
      id="mute-indicator"
      type="button"
      data-muted="false"
      aria-pressed="false"
      disabled
    >Unmuted</button>
    <div id="topic-controls">
      <input
        id="topic-search"
        type="search"
        aria-label="Filter Telegram topics"
        placeholder="Filter Telegram topics"
        disabled
      >
      <select id="topic" aria-label="Telegram topic" disabled>
        <option value="">Start voice to load topics</option>
      </select>
    </div>
    <span id="topic-status" role="status">not connected</span>
    <button id="top-button" type="button">Top ↑</button>
  </div>

  <main id="transcript" aria-live="polite"></main>

  <script
    type="module"
    src="/static/main.js?v=20260718-filter-layout"
  ></script>
</body>
</html>
