name: Curriculum Engine

on:
  push:
    branches:
      - agent/curriculum-engine-v2

permissions:
  contents: write

jobs:
  build-phase1:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: agent/curriculum-engine-v2
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.30"
          enable-cache: true

      - name: Extract Phase 1 payload
        shell: bash
        run: |
          set -Eeuo pipefail
          awk '/^VU9F2H7Z9tsZ/{capture=1} capture{print} /^PAYLOAD$/{exit}' \
            .github/workflows/build-phase1-content.yml | sed '$d' \
            > /tmp/phase1.tar.gz.b64
          base64 -d /tmp/phase1.tar.gz.b64 > /tmp/phase1.tar.gz
          echo 'e4a9c7f8bb44dfdb73de3373ef225f8badda7706b4e59d9a2290fdcb7d0e5051  /tmp/phase1.tar.gz' \
            | sha256sum -c -
          tar -xzf /tmp/phase1.tar.gz

      - name: Validate generated content
        run: |
          set -Eeuo pipefail
          uv sync --dev
          uv run python -m compileall -q hermes_voice tests
          uv run ruff check \
            hermes_voice/study/phase1_content.py \
            hermes_voice/study/pack_api.py \
            hermes_voice/study/install.py \
            tests/study/test_phase1_content.py
          uv run pytest -q tests/study/test_phase1_content.py

      - name: Commit generated content
        shell: bash
        run: |
          set -Eeuo pipefail
          git checkout HEAD^ -- .github/workflows/curriculum-engine.yml
          rm -f \
            .github/workflows/build-phase1-content.yml \
            .github/workflows/run-phase1-build.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Add complete Phase 1 MCAT teaching content'
          git push origin HEAD:agent/curriculum-engine-v2
