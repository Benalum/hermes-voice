name: Curriculum Engine

on:
  push:
    branches:
      - agent/curriculum-engine-v2
  pull_request:
    branches:
      - agent/portable-study-sessions

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'push' && github.ref_name || github.event.pull_request.head.sha }}

      - name: Apply exact line-length fixes
        if: github.event_name == 'push'
        run: |
          python3 - <<'PY'
          from pathlib import Path

          source = Path("hermes_voice/study/curriculum_store.py")
          text = source.read_text()
          replacements = {
              '                db.execute(\n                    f"DELETE FROM curriculum_courses WHERE curriculum_key=? AND key NOT IN ({placeholders})",\n                    (curriculum.key, *sorted(course_keys)),\n                )':
              '                query = (\n                    "DELETE FROM curriculum_courses WHERE curriculum_key=? "\n                    f"AND key NOT IN ({placeholders})"\n                )\n                db.execute(query, (curriculum.key, *sorted(course_keys)))',
              '                db.execute(\n                    f"DELETE FROM curriculum_decks WHERE key NOT IN ({placeholders}) AND course_key IN "\n                    "(SELECT key FROM curriculum_courses WHERE curriculum_key=?)",\n                    (*sorted(deck_keys), curriculum.key),\n                )':
              '                query = (\n                    f"DELETE FROM curriculum_decks WHERE key NOT IN ({placeholders}) "\n                    "AND course_key IN "\n                    "(SELECT key FROM curriculum_courses WHERE curriculum_key=?)"\n                )\n                db.execute(query, (*sorted(deck_keys), curriculum.key))',
              '        due_at = None if rating == "skipped" else (moment + timedelta(days=interval_days)).isoformat()':
              '        due_at = (\n            None\n            if rating == "skipped"\n            else (moment + timedelta(days=interval_days)).isoformat()\n        )',
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f"Expected source snippet not found: {old[:80]!r}")
              text = text.replace(old, new, 1)
          source.write_text(text)

          test_path = Path("tests/study/test_curriculum_store.py")
          test_text = test_path.read_text()
          old = '    card = study.create_card(int(deck["id"]), question="What is memory?", answer="Stored information.")'
          new = '''    card = study.create_card(
              int(deck["id"]),
              question="What is memory?",
              answer="Stored information.",
          )'''
          if old not in test_text:
              raise SystemExit("Expected test snippet not found")
          test_path.write_text(test_text.replace(old, new, 1))
          PY

      - name: Commit exact fixes
        if: github.event_name == 'push'
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add hermes_voice/study/curriculum_store.py tests/study/test_curriculum_store.py
          git commit -m "Fix curriculum line lengths"
          git push origin HEAD:agent/curriculum-engine-v2

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.30"
          enable-cache: true

      - name: Sync development environment
        run: uv sync --dev

      - name: Focused Curriculum Engine tests
        run: |
          uv run pytest -q \
            tests/study/test_curriculum.py \
            tests/study/test_curriculum_store.py \
            tests/study/test_curriculum_api.py \
            tests/study/test_store.py \
            tests/study/test_responder.py \
            tests/study/test_starter_packs.py \
            tests/study/test_app.py

      - name: Ruff
        run: |
          uv run ruff check \
            hermes_voice/study/curriculum.py \
            hermes_voice/study/curriculum_store.py \
            hermes_voice/study/curriculum_api.py \
            hermes_voice/study/install.py \
            tests/study/test_curriculum.py \
            tests/study/test_curriculum_store.py \
            tests/study/test_curriculum_api.py

      - name: MyPy
        run: |
          uv run mypy --no-incremental \
            hermes_voice/study/curriculum.py \
            hermes_voice/study/curriculum_store.py \
            hermes_voice/study/curriculum_api.py

      - name: Complete model-free suite
        run: uv run pytest -q
