name: Study diagnostics

on:
  pull_request:
    branches: [feat/portable-container-stack]

permissions:
  contents: write

jobs:
  report:
    if: github.head_ref == 'agent/portable-study-sessions'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/portable-study-sessions
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
      - run: uv python install 3.12
      - run: uv sync --locked --extra speech --group dev
      - name: Capture diagnostics
        run: |
          {
            echo '===== RUFF ====='
            uv run ruff check . || true
            echo
            echo '===== MYPY ====='
            uv run mypy --no-incremental hermes_voice || true
          } > .ci-study-report.txt 2>&1
      - name: Commit diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .ci-study-report.txt
          git commit -m "Record Study lint diagnostics"
          git push origin HEAD:agent/portable-study-sessions
