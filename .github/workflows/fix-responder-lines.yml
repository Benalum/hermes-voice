name: Fix responder line lengths

on:
  pull_request:
    branches:
      - agent/curriculum-engine-v2

permissions:
  contents: read

jobs:
  fix:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.30"
      - run: uv sync --dev
      - name: Wrap long Study prompt strings
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("hermes_voice/study/responder.py")
          text = path.read_text()
          replacements = {
              '            "teach clearly, do not grade, then request repeat_question so Hermes asks this card again.\\n"\n':
              '            "teach clearly, do not grade, then request repeat_question so Hermes asks "\n'
              '            "this card again.\\n"\n',
              '            "correct, grade_hard when partially correct or correct only after substantial help, and "\n':
              '            "correct, grade_hard when partially correct or correct only after substantial "\n'
              '            "help, and "\n',
              '            "- If the learner explicitly asks to skip, reveal, repeat, read notes, or finish: request "\n':
              '            "- If the learner explicitly asks to skip, reveal, repeat, read notes, or "\n'
              '            "finish: request "\n',
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f"missing expected text: {old!r}")
              text = text.replace(old, new, 1)
          path.write_text(text)
          PY
          uv run ruff check hermes_voice/study/responder.py
      - uses: actions/upload-artifact@v4
        with:
          name: fixed-responder
          path: hermes_voice/study/responder.py
