name: Study autoformat

on:
  push:
    branches: [agent/portable-study-sessions]

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/portable-study-sessions
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
      - run: uv python install 3.12
      - run: uv sync --locked --extra speech --group dev
      - name: Apply Ruff fixes and formatting
        run: |
          uv run ruff check . --fix
          uv run ruff format .
      - name: Commit formatting
        run: |
          if git diff --quiet; then
            echo "No formatting changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add hermes_voice tests deploy
          git commit -m "Format Study implementation"
          git push origin HEAD:agent/portable-study-sessions
