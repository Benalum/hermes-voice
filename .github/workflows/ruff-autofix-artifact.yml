name: Ruff autofix artifact

on:
  pull_request:
    branches:
      - agent/curriculum-engine-v2

permissions:
  contents: read

jobs:
  autofix:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.30"
          enable-cache: true
      - run: uv sync --dev
      - name: Apply Ruff fixes
        run: |
          uv run ruff check --fix \
            hermes_voice/study/responder.py \
            hermes_voice/study/curriculum_responder.py \
            hermes_voice/study/install.py \
            hermes_voice/server/study_app.py \
            tests/study/test_ai_auto_advance.py
      - name: Upload fixed files
        uses: actions/upload-artifact@v4
        with:
          name: ruff-fixed-study-files
          path: |
            hermes_voice/study/responder.py
            hermes_voice/study/curriculum_responder.py
            hermes_voice/study/install.py
            hermes_voice/server/study_app.py
            tests/study/test_ai_auto_advance.py
